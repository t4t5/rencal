name: Publish to AUR

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]

jobs:
  publish_aur_bin:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Get version from latest GitHub release
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(gh release view --repo t4t5/rencal --json tagName -q .tagName)
          version="${tag#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Publishing rencal-bin ${version} to AUR"

      - name: Generate PKGBUILD
        run: |
          sed "s/VERSION_PLACEHOLDER/${{ steps.version.outputs.version }}/" \
              aur/PKGBUILD-bin.template > PKGBUILD
          cat PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: rencal-bin
          pkgbuild: ./PKGBUILD
          commit_username: ${{ vars.AUR_USERNAME }}
          commit_email: ${{ vars.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to v${{ steps.version.outputs.version }}"
          updpkgsums: true
