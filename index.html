<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + React + Typescript</title>
    <style>
      /* Prevent white flash before CSS loads */
      body[data-theme="classic"] {
        background-color: #1a1b26;
      }
      body[data-theme="ren"] {
        background-color: #131313;
      }
    </style>
  </head>

  <body>
    <script>
      // Restore persisted theme before React mounts to avoid a flash
      try {
        document.body.dataset.theme = JSON.parse(localStorage.getItem("theme")) || "classic"
      } catch {
        document.body.dataset.theme = "classic"
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
