<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>renCal</title>
    <style>
      /* Prevent white flash before CSS loads */
      body[data-theme="classic"],
      body:not([data-theme])[data-default-theme="classic"] {
        background-color: #1a1b26;
      }
      body[data-theme="ren"],
      body:not([data-theme])[data-default-theme="ren"] {
        background-color: #131313;
      }
    </style>
  </head>

  <body data-default-theme="ren">
    <script>
      // Restore persisted theme before React mounts to avoid a flash
      const DEFAULT_THEME = document.body.dataset.defaultTheme || "ren"
      try {
        document.body.dataset.theme = JSON.parse(localStorage.getItem("theme")) || DEFAULT_THEME
      } catch {
        document.body.dataset.theme = DEFAULT_THEME
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
